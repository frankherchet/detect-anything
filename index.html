<!doctype html>
<html lang="de">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <meta name="theme-color" content="#0f766e" id="themeColor">
    <meta
      name="description"
      content="Webcam-Objekterkennung mit lokal im Browser laufendem TensorFlow.js-Modell."
    >
    <title>Detect Anything</title>
    <link rel="manifest" href="manifest.webmanifest">
    <link rel="stylesheet" href="styles.css">
    <script src="https://cdn.jsdelivr.net/npm/@tensorflow/tfjs@4.22.0/dist/tf.min.js" defer></script>
    <script src="https://cdn.jsdelivr.net/npm/@tensorflow-models/coco-ssd@2.2.3/dist/coco-ssd.min.js" defer></script>
    <script src="https://cdn.jsdelivr.net/npm/@tensorflow-models/pose-detection@2.1.3/dist/pose-detection.min.js" defer></script>
    <script src="app.js" defer></script>
  </head>
  <body>
    <main class="app-shell">
      <section class="stage" aria-label="Webcam Objekterkennung">
        <div class="video-frame">
          <video id="camera" autoplay playsinline muted></video>
          <canvas id="overlay"></canvas>
          <div id="emptyState" class="empty-state">
            <div class="lens-mark" aria-hidden="true"></div>
            <h1>Detect Anything</h1>
            <p>Modell installieren, Kamera starten, Objekte und Posen lokal erkennen.</p>
          </div>
        </div>
      </section>

      <aside class="control-panel" aria-label="Steuerung">
        <header class="panel-header">
          <p class="eyebrow">Browser AI</p>
          <h2>Live-Erkennung</h2>
          <p id="statusText" class="status-text">Bereit.</p>
        </header>

        <label class="control-row stacked" for="modelSelect">
          <span>Modell</span>
          <select id="modelSelect">
            <option value="coco-lite">COCO-SSD Lite</option>
            <option value="coco-v2">COCO-SSD MobileNet V2</option>
            <option value="coco-v1">COCO-SSD MobileNet V1</option>
            <option value="pose-lightning">MoveNet Pose Lightning</option>
            <option value="pose-thunder">MoveNet Pose Thunder</option>
          </select>
        </label>

        <label class="control-row stacked" for="themeSelect">
          <span>Theme</span>
          <select id="themeSelect">
            <option value="studio">Studio</option>
            <option value="midnight">Midnight</option>
            <option value="cyberpunk">Cyberpunk</option>
            <option value="paper">Paper</option>
          </select>
        </label>

        <div class="actions" aria-label="Hauptaktionen">
          <button id="installButton" class="primary-button" type="button">
            <span aria-hidden="true">↓</span>
            <span>Modell installieren</span>
          </button>
          <button id="cameraButton" class="secondary-button" type="button" disabled>
            <span aria-hidden="true">◉</span>
            <span>Kamera starten</span>
          </button>
        </div>

        <div class="metrics" aria-label="Status">
          <div>
            <span class="metric-value" id="objectCount">0</span>
            <span class="metric-label" id="resultMetricLabel">Treffer</span>
          </div>
          <div>
            <span class="metric-value" id="fpsValue">0</span>
            <span class="metric-label">FPS</span>
          </div>
        </div>

        <label class="control-row" for="scoreSlider">
          <span>Konfidenz</span>
          <output id="scoreOutput" for="scoreSlider">55%</output>
        </label>
        <input id="scoreSlider" type="range" min="20" max="90" value="55" step="5">

        <label class="control-row" for="maxObjects">
          <span id="limitLabel">Max. Objekte</span>
          <output id="maxObjectsOutput" for="maxObjects">8</output>
        </label>
        <input id="maxObjects" type="range" min="1" max="20" value="8" step="1">

        <div class="toggle-row">
          <label>
            <input id="mirrorToggle" type="checkbox" checked>
            <span>Selfie spiegeln</span>
          </label>
          <label>
            <input id="labelsToggle" type="checkbox" checked>
            <span>Labels</span>
          </label>
        </div>

        <section class="detections" aria-label="Erkannte Objekte">
          <h3>Aktuelle Treffer</h3>
          <ul id="detectionList"></ul>
        </section>
      </aside>
    </main>
  </body>
</html>
